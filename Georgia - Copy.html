<!DOCTYPE html>
<html>
<head>
  <title>Georgia Scene</title>
  <style>
    body { background:#111; color:#fff; font-family:Arial; }
    .card {
      width:300px;
      background:#1a1a1a;
      margin:10px;
      padding:10px;
      display:inline-block;
      cursor:pointer;
    }
    img { width:100%; }
  </style>
</head>
<body>

<h1>Georgia Scene</h1>

<div id="bands"></div>

<script>

// 🎬 POPUP PLAYER
function playVideo(url) {
  let id = "";

  if (url.indexOf("v=") !== -1) {
    id = url.split("v=")[1].split("&")[0];
  }

  const overlay = document.createElement("div");
  overlay.style = `
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
  `;

  const frame = document.createElement("iframe");
  frame.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
  frame.width = "800";
  frame.height = "450";
  frame.allowFullscreen = true;

  overlay.appendChild(frame);
  document.body.appendChild(overlay);

  // fallback if blocked
  setTimeout(function() {
    try {
      if (!frame.contentWindow || frame.contentWindow.length === 0) {
        showFallback(overlay);
      }
    } catch (e) {
      showFallback(overlay);
    }
  }, 2000);
}

// ❌ NO YOUTUBE BUTTON ANYMORE
function showFallback(overlay) {
  overlay.innerHTML = `
    <div style="color:white; text-align:center;">
      <h2>Video can’t play here</h2>
      <p>This one is restricted</p>
      <button onclick="document.body.removeChild(this.parentElement.parentElement)" style="padding:10px 20px;">
        Back to bands
      </button>
    </div>
  `;
}

// get saved bands from admin page
let bands = JSON.parse(localStorage.getItem("bands")) || [];

const container = document.getElementById("bands");

bands.forEach(function(b) {

  const loc = b.location.toLowerCase();

  if (!loc.includes("ga") && !loc.includes("georgia")) return;

  let id = "";
  if (b.video.indexOf("v=") !== -1) {
    id = b.video.split("v=")[1].split("&")[0];
  }

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/0.jpg">
    <h3>${b.name}</h3>
    <p>${b.location}</p>
  `;

  div.onclick = function() {
    playVideo(b.video);
  };

  container.appendChild(div);

});

</script>

</body>
</html>
