<!DOCTYPE html>
<html>
<head>
  <title>Cracker Swamp Admin</title>
  <style>
    body { background:#111; color:#fff; font-family:Arial; padding:20px; }
    input { display:block; margin:10px 0; padding:10px; width:300px; }
    button { padding:10px 20px; margin-top:5px; }
    .card {
      background:#1a1a1a;
      margin:10px;
      padding:10px;
      width:300px;
    }
    img { width:100%; }
  </style>
</head>
<body>

<h1>Admin Panel</h1>

<input id="name" placeholder="Band Name">
<input id="location" placeholder="Location (Augusta, GA)">
<input id="video" placeholder="YouTube Link">

<button onclick="addBand()">Add Band</button>

<h2>Your Bands</h2>
<div id="list"></div>

<script>

let bands = JSON.parse(localStorage.getItem("bands")) || [];

function getId(url) {
  if (url.indexOf("v=") !== -1) {
    return url.split("v=")[1].split("&")[0];
  }
  return "";
}

function addBand() {
  const name = document.getElementById("name").value;
  const location = document.getElementById("location").value;
  const video = document.getElementById("video").value;

  if (!name || !video) {
    alert("Fill it out");
    return;
  }

  const id = getId(video);

  if (!id) {
    alert("Bad YouTube link");
    return;
  }

  // ✅ SIMPLE CHECK — if thumbnail loads, we accept it
  const testImg = new Image();
  testImg.src = "https://img.youtube.com/vi/" + id + "/0.jpg";

  testImg.onload = function() {
    bands.push({ name, location, video });
    localStorage.setItem("bands", JSON.stringify(bands));
    render();
  };

  testImg.onerror = function() {
    alert("Video not usable");
  };
}

function deleteBand(i) {
  bands.splice(i, 1);
  localStorage.setItem("bands", JSON.stringify(bands));
  render();
}

function render() {
  const container = document.getElementById("list");
  container.innerHTML = "";

  bands.forEach(function(b, i) {
    const id = getId(b.video);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${id}/0.jpg">
      <h3>${b.name}</h3>
      <p>${b.location}</p>
      <button onclick="deleteBand(${i})">Delete</button>
    `;

    container.appendChild(div);
  });
}

render();

</script>

</body>
</html>
