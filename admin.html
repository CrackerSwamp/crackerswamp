<!DOCTYPE html>
<html>
<head>
  <title>Cracker Swamp Admin</title>
  <style>
    body { background:#111; color:#fff; font-family:Arial; padding:20px; }
    input { display:block; margin:10px 0; padding:10px; width:300px; }
    button { padding:10px 20px; }
    .card {
      background:#1a1a1a;
      margin:10px;
      padding:10px;
      width:300px;
    }
    img { width:100%; }
  </style>
</head>
<body>

<h1>Admin Panel</h1>

<input id="name" placeholder="Band Name">
<input id="location" placeholder="Location">
<input id="video" placeholder="Paste YouTube Link">

<button onclick="addBand()">Add Band</button>

<h2>Your Bands</h2>
<div id="list"></div>

<script>

let bands = JSON.parse(localStorage.getItem("bands")) || [];

function addBand() {
  const name = document.getElementById("name").value;
  const location = document.getElementById("location").value;
  const video = document.getElementById("video").value;

  if (!name || !video) return alert("Fill it out");

  bands.push({ name, location, video });
  localStorage.setItem("bands", JSON.stringify(bands));

  render();
}

function render() {
  const container = document.getElementById("list");
  container.innerHTML = "";

  bands.forEach(b => {
    const id = b.video.split("v=")[1];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${id}/0.jpg">
      <h3>${b.name}</h3>
      <p>${b.location}</p>
    `;

    div.onclick = () => window.open(b.video, "_blank");

    container.appendChild(div);
  });
}

render();

</script>

</body>
</html>
