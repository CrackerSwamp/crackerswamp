<!DOCTYPE html>
<html>
<head>
  <title>Bands - Cracker Swamp</title>

  <style>
    body {
      background:#111;
      color:#fff;
      font-family:Arial;
      margin:0;
      text-align:center;
    }

    .nav {
      background:#0b0b0b;
      border-bottom:1px solid #222;
      padding:10px;
    }

    .nav img {
      height:195px;
    }

    .card {
      width:280px;
      background:#1a1a1a;
      margin:10px;
      padding:10px;
      display:inline-block;
      cursor:pointer;
    }

    .card img {
      width:100%;
    }
  </style>
</head>
<body>

<div class="nav">
  <img src="CRACKERSWAMP.png">
</div>

<h1>All Bands</h1>

<div id="bands"></div>

<!-- YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPq01s5eS_GQ_ECkfZsoT5Oo977gPpMS0",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp",
  storageBucket: "cracker-swamp.firebasestorage.app",
  messagingSenderId: "217552202123",
  appId: "1:217552202123:web:ed04bd70294f3713fa678e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let bandList = [];
let player;

// extract YouTube ID
function extractID(url) {
  if (!url || !url.includes("v=")) return "";
  return url.split("v=")[1].split("&")[0];
}

// PLAYER WITH FAST SKIP + BLACK SCREEN FIX
function playVideo(index) {

  let band = bandList[index];
  let id = extractID(band.video);

  const overlay = document.createElement("div");

  overlay.style = `
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:#0b0b0b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
    color:white;
  `;

  const loading = document.createElement("div");
  loading.innerText = "Loading...";
  loading.style.marginBottom = "10px";

  const playerDiv = document.createElement("div");
  playerDiv.id = "ytplayer";
  playerDiv.style.display = "none";

  overlay.appendChild(loading);
  overlay.appendChild(playerDiv);
  document.body.appendChild(overlay);

  let started = false;

  player = new YT.Player("ytplayer", {
    height: "450",
    width: "800",
    videoId: id,
    playerVars: { autoplay: 1 },
    events: {

      onReady: (e) => {
        e.target.playVideo();
      },

      onStateChange: (e) => {

        // ONLY show if truly playing
        if (e.data === 1) {
          started = true;
          playerDiv.style.display = "block";
          loading.style.display = "none";
        }

        // ended → next
        if (e.data === 0) {
          overlay.remove();
          nextVideo(index);
        }
      },

      // error → skip immediately
      onError: () => {
        overlay.remove();
        nextVideo(index);
      }
    }
  });

  // FAST SKIP if not really playing
  setTimeout(() => {
    if (!started) {
      overlay.remove();
      nextVideo(index);
    }
  }, 2500);
}

// NEXT VIDEO
function nextVideo(i) {
  let next = i + 1;
  if (next >= bandList.length) next = 0;
  playVideo(next);
}

// LOAD FROM FIREBASE
async function loadBands() {

  const snapshot = await getDocs(collection(db, "bands"));

  const container = document.getElementById("bands");
  container.innerHTML = "";
  bandList = [];

  snapshot.forEach((docItem) => {

    let b = docItem.data();
    bandList.push(b);

    let id = extractID(b.video);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${id}/0.jpg">
      <h3>${b.name || "Unknown Band"}</h3>
      <p>${b.location || ""}</p>
    `;

    let index = bandList.length - 1;

    div.onclick = () => playVideo(index);

    container.appendChild(div);
  });
}

loadBands();

</script>

</body>
</html>
