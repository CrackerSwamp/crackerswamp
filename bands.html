<!DOCTYPE html>
<html>
<head>
  <title>Bands - Cracker Swamp</title>
  <style>
    body {
      background:#111;
      color:#fff;
      font-family:Arial;
      margin:0;
      text-align:center;
    }

    .nav {
      background:#0b0b0b;
      border-bottom:1px solid #222;
      padding:10px;
    }

    .nav img {
      height:195px;
    }

    .card {
      width:280px;
      background:#1a1a1a;
      margin:10px;
      padding:10px;
      display:inline-block;
    }

    .card img {
      width:100%;
    }
  </style>
</head>
<body>

<div class="nav">
  <img src="CRACKERSWAMP.png">
</div>

<h1>All Bands</h1>

<div id="bands"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPq01s5eS_GQ_ECkfZsoT5Oo977gPpMS0",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp",
  storageBucket: "cracker-swamp.firebasestorage.app",
  messagingSenderId: "217552202123",
  appId: "1:217552202123:web:ed04bd70294f3713fa678e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let bandList = [];
const container = document.getElementById("bands");

function extractID(url) {
  if (!url || !url.includes("v=")) return "";
  return url.split("v=")[1].split("&")[0];
}

// 🔥 PLAYER
function playVideo(index) {

  let band = bandList[index];
  let id = extractID(band.video);

  const overlay = document.createElement("div");
  overlay.id = "overlay";

  overlay.style = `
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:#0b0b0b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
  `;

  overlay.innerHTML = `
    <h1 style="font-size:42px;">Cracker Swamp</h1>
    <h2 style="color:#ccc;margin-bottom:15px;">${band.name}</h2>

    <iframe width="800" height="450"
      src="https://www.youtube.com/embed/${id}?autoplay=1"
      frameborder="0" allowfullscreen>
    </iframe>

    <div style="margin-top:15px;">
      <button onclick="nextVideo(${index})">Next</button>
      <button onclick="replayVideo(${index})">Replay</button>
      <button onclick="closePlayer()">Close</button>
    </div>
  `;

  document.body.appendChild(overlay);
}

window.closePlayer = function() {
  document.getElementById("overlay").remove();
};

window.replayVideo = function(i) {
  closePlayer();
  playVideo(i);
};

window.nextVideo = function(i) {
  closePlayer();
  let next = i + 1;
  if (next >= bandList.length) next = 0;
  playVideo(next);
};

// 🔥 LOAD DATA
async function loadBands() {

  const snapshot = await getDocs(collection(db, "bands"));

  container.innerHTML = "";
  bandList = [];

  snapshot.forEach((docItem) => {

    let b = docItem.data();
    bandList.push(b);

    let id = extractID(b.video);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${id}/0.jpg">
      <h3>${b.name || "Unknown Band"}</h3>
      <p>${b.location || ""}</p>
    `;

    let index = bandList.length - 1;

    div.onclick = () => playVideo(index);

    container.appendChild(div);
  });

}

loadBands();

</script>

</body>
</html>
