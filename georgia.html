<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Georgia Scene - Cracker Swamp</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    #video-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .video-card {
      width: 300px;
      background: #1a1a1a;
      padding: 10px;
      border-radius: 8px;
    }

    iframe {
      width: 100%;
      height: 180px;
    }
  </style>
</head>

<body>

<h1>Georgia Scene</h1>

<div id="video-container"></div>

<script type="module">
import { videos } from "./data/data.js";

const container = document.getElementById("video-container");

const georgiaVideos = videos.filter(v => v.state === "georgia");

georgiaVideos.forEach(video => {
  const div = document.createElement("div");
  div.className = "video-card";

  div.innerHTML = `
    <iframe src="https://www.youtube.com/embed/${video.youtubeId}" allowfullscreen></iframe>
    <h3>${video.title}</h3>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
