<!DOCTYPE html>
<html>
<head>
  <title>Georgia Scene</title>
  <style>
    body {
      background:#111;
      color:#fff;
      font-family:Arial;
      margin:0;
      text-align:center;
    }

    .nav {
      background:#0b0b0b;
      border-bottom:1px solid #222;
      padding:10px;
    }

    .nav img {
      height:195px;
    }

    .card {
      width:300px;
      background:#1a1a1a;
      margin:10px;
      padding:10px;
      display:inline-block;
      cursor:pointer;
    }

    .card img {
      width:100%;
    }

    #overlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
    }
  </style>
</head>
<body>

<div class="nav">
  <img src="CRACKERSWAMP.png">
</div>

<h1>Georgia Scene</h1>

<div id="bands"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPq01s5eS_GQ_ECkfZsoT5Oo977gPpMS0",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp",
  storageBucket: "cracker-swamp.firebasestorage.app",
  messagingSenderId: "217552202123",
  appId: "1:217552202123:web:ed04bd70294f3713fa678e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allBands = [];

function extractID(url) {
  if (!url || !url.includes("v=")) return "";
  return url.split("v=")[1].split("&")[0];
}

function playVideo(band) {

  let id = extractID(band.video);

  const overlay = document.createElement("div");
  overlay.id = "overlay";

  overlay.innerHTML = `
    <iframe width="800" height="450"
      src="https://www.youtube.com/embed/${id}?autoplay=1"
      frameborder="0" allowfullscreen>
    </iframe>
  `;

  overlay.onclick = () => overlay.remove();

  document.body.appendChild(overlay);
}

async function loadBands() {

  const snapshot = await getDocs(collection(db, "bands"));

  const container = document.getElementById("bands");
  container.innerHTML = "";

  snapshot.forEach((docItem) => {

    let b = docItem.data();

    let loc = (b.location || "").toLowerCase();
    if (!loc.includes("ga") && !loc.includes("georgia")) return;

    allBands.push(b);

    let id = extractID(b.video);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${id}/0.jpg">
      <h3>${b.name || "Unknown Band"}</h3>
      <p>${b.location}</p>
    `;

    div.onclick = () => playVideo(b);

    container.appendChild(div);
  });
}

loadBands();

</script>

</body>
</html>
