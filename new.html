<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cracker Swamp</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    overflow: hidden;
    background: #111;
    color: #fff;
  }

  .container {
    display: flex;
    width: 100vw;
    height: 100vh;
    overflow-x: scroll;
    scroll-snap-type: x mandatory;
  }

  .panel {
    flex: 0 0 100vw;
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    position: relative;
  }

  /* Different vibes per section */
  .radio { background: #1a1a1a; }
  .video { background: #222; }
  .comedy { background: #2a2a2a; }
  .news { background: #333; }

  h1 {
    margin-bottom: 10px;
  }

  .content {
    font-size: 1rem;
    opacity: 0.7;
  }

  /* Nav indicator */
  .nav {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #555;
  }

  .dot.active {
    background: #fff;
  }
</style>
</head>

<body>

<div class="container" id="container">

  <div class="panel radio">
    <h1>📻 The Station</h1>
    <div class="content">Live swamp radio</div>
  </div>

  <div class="panel video">
    <h1>🎥 Back Room TV</h1>
    <div class="content">Videos & visuals</div>
  </div>

  <div class="panel comedy">
    <h1>😂 Joke Counter</h1>
    <div class="content">Comedy & chaos</div>
  </div>

  <div class="panel news">
    <h1>📰 Bulletin Board</h1>
    <div class="content">News & updates</div>
  </div>

</div>

<div class="nav" id="nav">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<script>
  const container = document.getElementById("container");
  const dots = document.querySelectorAll(".dot");

  container.addEventListener("scroll", () => {
    const index = Math.round(container.scrollLeft / window.innerWidth);

    dots.forEach(dot => dot.classList.remove("active"));
    if (dots[index]) dots[index].classList.add("active");
  });
</script>

</body>
</html>
