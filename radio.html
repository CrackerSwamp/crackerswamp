<!DOCTYPE html>
<html>
<head>
  <title>Cracker Swamp Radio</title>

  <style>
    body {
      background:#0b0b0b;
      color:white;
      font-family:Arial;
      margin:0;
      text-align:center;
    }

    .nav {
      border-bottom:1px solid #222;
      padding:10px;
    }

    .nav img {
      height:195px;
    }

    .player {
      margin-top:50px;
    }

    button {
      padding:10px 20px;
      margin:5px;
      background:#222;
      color:white;
      border:none;
      cursor:pointer;
    }

    #nowPlaying {
      margin-top:20px;
      font-size:20px;
    }

    .sub {
      color:#777;
      font-size:14px;
    }
  </style>
</head>
<body>

<div class="nav">
  <img src="CRACKERSWAMP.png">
</div>

<h1>Cracker Swamp Radio</h1>
<p>Real bands. No filler.</p>

<div class="player">

  <audio id="audioPlayer" controls></audio>

  <div id="nowPlaying">Loading...</div>

  <div>
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPq01s5eS_GQ_ECkfZsoT5Oo977gPpMS0",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp",
  storageBucket: "cracker-swamp.firebasestorage.app",
  messagingSenderId: "217552202123",
  appId: "1:217552202123:web:ed04bd70294f3713fa678e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let playlist = [];
let current = 0;

const audio = document.getElementById("audioPlayer");
const now = document.getElementById("nowPlaying");

// 🔥 SHUFFLE
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// LOAD SONGS
async function loadSongs() {

  const snapshot = await getDocs(collection(db, "bands"));

  playlist = [];

  snapshot.forEach((docItem) => {
    let b = docItem.data();

    if (b.mp3) {
      playlist.push(b);
    }
  });

  if (playlist.length > 0) {
    shuffle(playlist);
    play(0);
  } else {
    now.innerText = "No songs available yet";
  }
}

// PLAY
function play(index) {

  current = index;
  let song = playlist[index];

  audio.src = song.mp3;

  audio.play().catch(() => {
    now.innerText = "Click play to start radio";
  });

  now.innerHTML = `
    <strong>${song.name}</strong><br>
    <span class="sub">${song.location || ""}</span>
  `;
}

// NEXT
window.next = function() {
  let n = current + 1;
  if (n >= playlist.length) n = 0;
  play(n);
};

// PREV
window.prev = function() {
  let p = current - 1;
  if (p < 0) p = playlist.length - 1;
  play(p);
};

// AUTO NEXT
audio.addEventListener("ended", () => {
  next();
});

loadSongs();

</script>

</body>
</html>
