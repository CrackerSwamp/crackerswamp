<!DOCTYPE html>
<html>
<head>
  <title>Radio Design</title>

  <style>
    body {
      background:#0b0b0b;
      margin:0;
      font-family:Arial;
      color:#e9d7b3;
      text-align:center;
    }

    .radio {
      width:95%;
      max-width:520px;
      margin:20px auto;
      padding:8px;
      background:linear-gradient(135deg,#5b3f2b,#3a2518);
      border-radius:12px;
      position:relative;
      box-shadow:0 0 30px #000;
    }

    /* BODY BEADING */
    .radio:before {
      content:"";
      position:absolute;
      inset:0;
      border:3px solid #d4af37;
      border-radius:12px;
    }

    .radio:after {
      content:"";
      position:absolute;
      inset:5px;
      border:2px solid #8b6a2b;
      border-radius:10px;
    }

    .innerBead {
      position:absolute;
      inset:10px;
      border:1px solid #2a1a10;
      border-radius:8px;
    }

    .top {
      display:flex;
      justify-content:center;
      align-items:flex-start;
      gap:12px;
      margin-top:10px;
    }

    /* SPEAKERS */
    .speaker {
      width:105px;
      height:105px;
      border-radius:50%;
      background:radial-gradient(#444,#000);
      position:relative;
      box-shadow:inset 0 0 25px #000;
      margin-top:10px; /* 🔥 10% drop */
    }

    /* SPEAKER BEADING */
    .speaker:before {
      content:"";
      position:absolute;
      inset:-6px;
      border:2px solid #d4af37;
      border-radius:50%;
    }

    .speaker:after {
      content:"";
      position:absolute;
      inset:6px;
      border:1px solid #8b6a2b;
      border-radius:50%;
    }

    /* SCREEN */
    .screenWrap {
      width:34%;
      position:relative;
      padding:4px;
    }

    .screenWrap:before {
      content:"";
      position:absolute;
      inset:0;
      border:2px solid #d4af37;
    }

    .screenWrap:after {
      content:"";
      position:absolute;
      inset:4px;
      border:1px solid #8b6a2b;
    }

    .screenInner {
      position:absolute;
      inset:8px;
      border:1px solid #2a1a10;
    }

    .screen {
      position:relative;
      background:#000;
      color:#00ff88;
      font-family:Courier New;
      font-size:12px;
      padding:4px;
      white-space:nowrap;
      overflow:hidden;
    }

    /* BUTTONS (visual only) */
    .controls {
      margin-top:6px;
    }

    .btnRowTop,
    .btnRowBottom {
      display:flex;
      justify-content:center;
      gap:6px;
    }

    button {
      width:36px;
      height:30px;
      background:#1f1f1f;
      color:#fff;
      border:none;
      font-size:14px;
    }

    /* KNOBS */
    .knobs {
      position:relative;
      margin-top:10px;
      padding-bottom:0.3in; /* 🔥 lifts knobs up */
      display:flex;
      justify-content:space-around;
    }

    .knobWrap {
      text-align:center;
    }

    .knob {
      width:60px;
      height:60px;
      border-radius:50%;
      background:#222;
      position:relative;
      box-shadow:inset 0 0 10px #000;
    }

    .indicator {
      width:3px;
      height:20px;
      background:#d4af37;
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
    }

    .knobLabel {
      font-size:11px;
      margin-top:2px;
      color:#bfa77a;
      letter-spacing:1px;
    }

  </style>
</head>
<body>

<div class="radio">
<div class="innerBead"></div>

  <div class="top">
    <div class="speaker"></div>

    <div class="screenWrap">
      <div class="screenInner"></div>
      <div class="screen">Now Playing — Sample Track</div>
    </div>

    <div class="speaker"></div>
  </div>

  <div class="controls">
    <div class="btnRowTop">
      <button>⏮</button>
      <button>▶</button>
      <button>⏸</button>
      <button>⏭</button>
    </div>

    <div class="btnRowBottom">
      <button>🔁</button>
      <button>🔀</button>
    </div>
  </div>

  <div class="knobs">
    <div class="knobWrap">
      <div class="knob"><div class="indicator"></div></div>
      <div class="knobLabel">VOL</div>
    </div>

    <div class="knobWrap">
      <div class="knob"><div class="indicator"></div></div>
      <div class="knobLabel">TUNE</div>
    </div>
  </div>

</div>

</body>
</html>
