<!DOCTYPE html>
<html>
<head>
  <title>Cracker Swamp Radio</title>

  <style>
    body {
      background:linear-gradient(#0b0b0b,#000);
      color:white;
      font-family:Arial;
      margin:0;
      text-align:center;
    }

    .nav {
      border-bottom:1px solid #222;
      padding:10px;
    }

    .nav img {
      height:150px;
    }

    .radio-box {
      margin-top:40px;
    }

    #art {
      width:300px;
      height:300px;
      object-fit:cover;
      border-radius:10px;
      box-shadow:0 0 20px rgba(255,255,255,0.1);
    }

    #nowPlaying {
      font-size:26px;
      margin-top:20px;
    }

    #location {
      color:#888;
      margin-top:5px;
    }

    .live {
      margin-top:10px;
      color:red;
      font-weight:bold;
    }

    #startBtn {
      padding:15px 30px;
      font-size:18px;
      background:red;
      color:white;
      border:none;
      margin-top:30px;
      cursor:pointer;
    }

    .controls {
      margin-top:25px;
      display:none;
    }

    .controls button {
      padding:12px 20px;
      margin:5px;
      background:#1f1f1f;
      color:white;
      border:none;
      font-size:16px;
      cursor:pointer;
    }

    .controls button:hover {
      background:#333;
    }
  </style>
</head>
<body>

<div class="nav">
  <img src="CRACKERSWAMP.png">
</div>

<div class="radio-box">

  <img id="art" src="https://via.placeholder.com/300">

  <div id="nowPlaying">Cracker Swamp Radio</div>
  <div id="location"></div>
  <div class="live">● LIVE</div>

  <button id="startBtn">▶ Start Radio</button>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="pause()">⏸</button>
    <button onclick="next()">⏭</button>
  </div>

</div>

<audio id="audioPlayer"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPq01s5eS_GQ_ECkfZsoT5Oo977gPpMS0",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp",
  storageBucket: "cracker-swamp.firebasestorage.app",
  messagingSenderId: "217552202123",
  appId: "1:217552202123:web:ed04bd70294f3713fa678e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let playlist = [];
let current = 0;

const audio = document.getElementById("audioPlayer");
const now = document.getElementById("nowPlaying");
const loc = document.getElementById("location");
const art = document.getElementById("art");
const startBtn = document.getElementById("startBtn");
const controls = document.querySelector(".controls");

// shuffle
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// extract youtube thumbnail
function getThumb(video) {
  if (!video || !video.includes("v=")) return "";
  let id = video.split("v=")[1].split("&")[0];
  return "https://img.youtube.com/vi/" + id + "/0.jpg";
}

// load songs
async function loadSongs() {
  const snapshot = await getDocs(collection(db, "bands"));

  snapshot.forEach(doc => {
    let b = doc.data();
    if (b.mp3) playlist.push(b);
  });

  shuffle(playlist);
}

// load track
function loadTrack(i) {
  current = i;
  let song = playlist[i];

  audio.src = song.mp3;

  now.innerHTML = `<strong>${song.name}</strong>`;
  loc.innerText = song.location || "";

  let thumb = getThumb(song.video);
  if (thumb) art.src = thumb;
}

// start
startBtn.onclick = () => {
  loadTrack(0);
  audio.play().then(() => {
    startBtn.style.display = "none";
    controls.style.display = "block";
  });
};

// controls
window.next = function() {
  let n = (current + 1) % playlist.length;
  loadTrack(n);
  audio.play();
};

window.prev = function() {
  let p = (current - 1 + playlist.length) % playlist.length;
  loadTrack(p);
  audio.play();
};

window.pause = function() {
  audio.pause();
};

audio.addEventListener("ended", () => next());

loadSongs();

</script>

</body>
</html>
