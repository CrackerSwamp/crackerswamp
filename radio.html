<!DOCTYPE html>
<html>
<head>
  <title>Cracker Swamp Radio</title>

  <style>
    body {
      background:#0b0b0b;
      font-family:Arial;
      color:#f5e6c8;
      text-align:center;
      margin:0;
    }

    .radio {
      width:700px;
      margin:40px auto;
      padding:20px;
      background:linear-gradient(145deg,#3a2a1f,#2a1a10);
      border:6px solid #1a120b;
      border-radius:15px;
      box-shadow:0 0 40px black;
    }

    /* Deco Title */
    .title {
      font-size:28px;
      letter-spacing:4px;
      margin-bottom:15px;
      color:#d4af37;
    }

    /* Screen */
    .screen {
      background:black;
      color:#00ff88;
      padding:10px;
      margin:10px auto;
      width:80%;
      overflow:hidden;
      white-space:nowrap;
      font-family:Courier New;
      border:2px solid #333;
    }

    .scroll {
      display:inline-block;
      animation: scroll 12s linear infinite;
    }

    @keyframes scroll {
      from { transform: translateX(100%); }
      to { transform: translateX(-100%); }
    }

    /* Speakers */
    .speakers {
      display:flex;
      justify-content:space-between;
      margin-top:20px;
    }

    .speaker {
      width:120px;
      height:120px;
      border-radius:50%;
      background:radial-gradient(#333,#000);
      box-shadow:inset 0 0 20px black;
    }

    /* Controls */
    .controls {
      margin-top:20px;
    }

    button {
      padding:10px 15px;
      margin:5px;
      background:#1f1f1f;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover {
      background:#333;
    }

    /* Knobs */
    .knobs {
      display:flex;
      justify-content:space-around;
      margin-top:20px;
    }

    .knob {
      width:80px;
      height:80px;
      border-radius:50%;
      background:#222;
      position:relative;
      cursor:pointer;
      box-shadow:inset 0 0 10px black;
    }

    .indicator {
      width:4px;
      height:30px;
      background:#d4af37;
      position:absolute;
      top:10px;
      left:50%;
      transform-origin:bottom center;
    }

  </style>
</head>
<body>

<div class="radio">

  <div class="title">CRACKER SWAMP RADIO</div>

  <div class="screen">
    <div id="scrollText" class="scroll">Loading...</div>
  </div>

  <div class="speakers">
    <div class="speaker"></div>
    <div class="speaker"></div>
  </div>

  <div class="controls">
    <button onclick="play()">Play</button>
    <button onclick="pause()">Pause</button>
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
    <button onclick="toggleLoop()">Loop</button>
    <button onclick="shuffleToggle()">Random</button>
  </div>

  <div class="knobs">
    <div class="knob" onclick="volumeUp()">
      <div class="indicator"></div>
    </div>
    <div class="knob" onclick="next()">
      <div class="indicator"></div>
    </div>
  </div>

</div>

<audio id="audioPlayer"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let playlist = [];
let current = 0;
let randomMode = false;
let loop = false;

const audio = document.getElementById("audioPlayer");
const scroll = document.getElementById("scrollText");

async function loadSongs() {
  const snap = await getDocs(collection(db, "bands"));
  snap.forEach(doc => {
    let b = doc.data();
    if (b.mp3) playlist.push(b);
  });
  loadTrack(0);
}

function loadTrack(i) {
  current = i;
  let song = playlist[i];
  audio.src = song.mp3;
  scroll.innerText = song.name + " - " + (song.location || "");
}

window.play = () => audio.play();
window.pause = () => audio.pause();

window.next = function() {
  current = randomMode ? Math.floor(Math.random()*playlist.length)
                       : (current+1)%playlist.length;
  loadTrack(current);
  play();
};

window.prev = function() {
  current = (current-1+playlist.length)%playlist.length;
  loadTrack(current);
  play();
};

window.toggleLoop = () => loop = !loop;
window.shuffleToggle = () => randomMode = !randomMode;

audio.addEventListener("ended", () => {
  loop ? play() : next();
});

window.volumeUp = () => {
  audio.volume = Math.min(1, audio.volume + 0.1);
};

loadSongs();

</script>

</body>
</html>
