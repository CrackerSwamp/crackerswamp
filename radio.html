<!DOCTYPE html>
<html>
<head>
  <title>Radio</title>

  <style>
    body {
      background:#0b0b0b;
      margin:0;
      font-family:Arial;
      color:#e9d7b3;
      text-align:center;
    }

    .radio {
      width:760px;
      margin:40px auto;
      padding:18px;
      background:linear-gradient(135deg,#5b3f2b,#3a2518);
      border:10px solid #2a1a10;
      border-radius:12px;
      box-shadow:0 0 40px #000;
      position:relative;
    }

    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    /* SPEAKERS */
    .speaker {
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(#444,#000);
      box-shadow:inset 0 0 35px #000;
      transition:transform 0.1s linear;
    }

    .speaker.vibe {
      animation:pulse 0.25s infinite alternate;
    }

    @keyframes pulse {
      from { transform:scale(1); }
      to { transform:scale(1.05); }
    }

    /* SCREEN WRAP */
    .screenWrap {
      width:38%;
      position:relative;
      padding:10px;
    }

    /* 🔥 TRIPLE BEAD (depth restored) */
    .screenBead1,
    .screenBead2,
    .screenBead3 {
      position:absolute;
      border-radius:4px;
      pointer-events:none;
    }

    .screenBead1 { inset:0; border:3px solid #d4af37; }
    .screenBead2 { inset:4px; border:2px solid #8b6a2b; }
    .screenBead3 { inset:8px; border:1px solid #2a1a10; }

    .screen {
      position:relative;
      background:#000;
      color:#00ff88;
      padding:6px;
      font-family:Courier New;
      overflow:hidden;
      white-space:nowrap;
    }

    .scroll {
      display:inline-block;
      animation:scroll 10s linear infinite;
    }

    @keyframes scroll {
      from { transform:translateX(100%); }
      to { transform:translateX(-100%); }
    }

    .controls {
      margin-top:15px;
    }

    button {
      width:42px;
      height:34px;
      margin:4px;
      background:#1f1f1f;
      color:#fff;
      border:none;
      cursor:pointer;
    }

    .knobs {
      display:flex;
      justify-content:space-around;
      margin-top:15px;
    }

    .knob {
      width:80px;
      height:80px;
      border-radius:50%;
      background:#222;
      position:relative;
      box-shadow:inset 0 0 12px #000;
    }

    .indicator {
      width:4px;
      height:28px;
      background:#d4af37;
      position:absolute;
      top:12px;
      left:50%;
      transform:translateX(-50%);
    }

  </style>
</head>
<body>

<div class="radio">

  <div class="top">
    <div class="speaker" id="spkL"></div>

    <div class="screenWrap">
      <div class="screenBead1"></div>
      <div class="screenBead2"></div>
      <div class="screenBead3"></div>

      <div class="screen">
        <div id="scrollText" class="scroll">Loading...</div>
      </div>
    </div>

    <div class="speaker" id="spkR"></div>
  </div>

  <div class="controls">
    <button onclick="btn('Prev'); prev()">⏮</button>
    <button onclick="btn('Play'); play()">▶</button>
    <button onclick="btn('Pause'); pause()">⏸</button>
    <button onclick="btn('Next'); next()">⏭</button>
    <button onclick="btn('Loop'); toggleLoop()">🔁</button>
    <button onclick="btn('Random'); shuffleToggle()">🔀</button>
  </div>

  <div class="knobs">
    <div class="knob" onclick="volumeUp()">
      <div class="indicator"></div>
    </div>

    <div class="knob" onclick="tune()">
      <div class="indicator"></div>
    </div>
  </div>

</div>

<audio id="audioPlayer"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let playlist = [];
let current = 0;
let randomMode = false;
let loop = false;

let genres = ["Rock","Indie","Punk","Blues"];
let genreIndex = 0;
let tuningMode = "genre";

const audio = document.getElementById("audioPlayer");
const scroll = document.getElementById("scrollText");
const spkL = document.getElementById("spkL");
const spkR = document.getElementById("spkR");

let timeout;

// display helper
function showTemp(text){
  clearTimeout(timeout);
  scroll.innerText = text;
  timeout = setTimeout(showNowPlaying,1500);
}

function showNowPlaying(){
  let song = playlist[current];
  scroll.innerText = song.name + " - " + (song.location || "");
}

async function loadSongs(){
  const snap = await getDocs(collection(db,"bands"));
  snap.forEach(doc=>{
    let b = doc.data();
    if(b.mp3) playlist.push(b);
  });
  loadTrack(0);
}

function loadTrack(i){
  current = i;
  audio.src = playlist[i].mp3;
  showNowPlaying();
}

// BUTTON FLASH
window.btn = function(name){
  showTemp(name.toUpperCase());
};

// PLAYBACK
window.play = ()=>{
  audio.play();
  spkL.classList.add("vibe");
  spkR.classList.add("vibe");
};

window.pause = ()=>{
  audio.pause();
  spkL.classList.remove("vibe");
  spkR.classList.remove("vibe");
};

window.next = ()=>{
  current = randomMode ? Math.floor(Math.random()*playlist.length)
                       : (current+1)%playlist.length;
  loadTrack(current);
  play();
};

window.prev = ()=>{
  current = (current-1+playlist.length)%playlist.length;
  loadTrack(current);
  play();
};

window.toggleLoop = ()=> loop = !loop;
window.shuffleToggle = ()=> randomMode = !randomMode;

audio.addEventListener("ended",()=>{
  loop ? play() : next();
});

// VOLUME
window.volumeUp = ()=>{
  audio.volume = Math.min(1, audio.volume + 0.1);
  showTemp("VOL " + Math.round(audio.volume*100));
};

// TUNING LOGIC
window.tune = ()=>{
  if(tuningMode === "genre"){
    genreIndex = (genreIndex+1)%genres.length;
    showTemp("GENRE: " + genres[genreIndex]);

    // switch to band mode after pause
    setTimeout(()=> tuningMode="band",1500);
  } else {
    next();
    showTemp("TUNE");
  }
};

loadSongs();

</script>

</body>
</html>
