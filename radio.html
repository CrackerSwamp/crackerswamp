<!DOCTYPE html>
<html>
<head>
  <title>Cracker Swamp Radio</title>

  <style>
    body {
      background:#0b0b0b;
      color:white;
      font-family:Arial;
      margin:0;
      text-align:center;
    }

    .nav {
      border-bottom:1px solid #222;
      padding:10px;
    }

    .nav img {
      height:195px;
    }

    .player {
      margin-top:60px;
    }

    #nowPlaying {
      font-size:22px;
      margin-bottom:10px;
    }

    .sub {
      color:#777;
      font-size:14px;
      margin-bottom:20px;
    }

    .controls button {
      padding:12px 25px;
      margin:5px;
      background:#1f1f1f;
      color:white;
      border:none;
      cursor:pointer;
      font-size:16px;
    }

    .controls button:hover {
      background:#333;
    }

    .status {
      margin-top:15px;
      color:#666;
      font-size:14px;
    }
  </style>
</head>
<body>

<div class="nav">
  <img src="CRACKERSWAMP.png">
</div>

<h1>Cracker Swamp Radio</h1>
<p>Real bands. No filler.</p>

<div class="player">

  <div id="nowPlaying">Loading...</div>
  <div id="location" class="sub"></div>

  <div class="controls">
    <button onclick="prev()">⏮ Prev</button>
    <button onclick="play()">▶ Play</button>
    <button onclick="pause()">⏸ Pause</button>
    <button onclick="next()">⏭ Next</button>
  </div>

  <div class="status" id="status"></div>

</div>

<audio id="audioPlayer"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPq01s5eS_GQ_ECkfZsoT5Oo977gPpMS0",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp",
  storageBucket: "cracker-swamp.firebasestorage.app",
  messagingSenderId: "217552202123",
  appId: "1:217552202123:web:ed04bd70294f3713fa678e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let playlist = [];
let current = 0;

const audio = document.getElementById("audioPlayer");
const now = document.getElementById("nowPlaying");
const loc = document.getElementById("location");
const status = document.getElementById("status");

// SHUFFLE
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// LOAD SONGS
async function loadSongs() {

  const snapshot = await getDocs(collection(db, "bands"));

  playlist = [];

  snapshot.forEach((docItem) => {
    let b = docItem.data();
    if (b.mp3) playlist.push(b);
  });

  if (playlist.length > 0) {
    shuffle(playlist);
    loadTrack(0);
  } else {
    now.innerText = "No songs available";
  }
}

// LOAD TRACK (DO NOT preload audio)
function loadTrack(index) {
  current = index;
  let song = playlist[index];

  // 🚫 do NOT set audio.src here
  audio.src = "";

  now.innerHTML = `<strong>${song.name}</strong>`;
  loc.innerText = song.location || "";
  status.innerText = "Ready";
}

// PLAY (first click always works)
window.play = function() {

  if (!playlist.length) return;

  let song = playlist[current];

  // Bind source ONLY on user click
  if (!audio.src) {
    audio.src = song.mp3;
    audio.load();
  }

  audio.play().then(() => {
    status.innerText = "Playing";
  }).catch(() => {
    status.innerText = "Click Play again";
  });
};

// PAUSE
window.pause = function() {
  audio.pause();
  status.innerText = "Paused";
};

// NEXT
window.next = function() {
  let n = current + 1;
  if (n >= playlist.length) n = 0;

  let song = playlist[n];

  current = n;
  audio.src = song.mp3;
  audio.load();
  play();
};

// PREV
window.prev = function() {
  let p = current - 1;
  if (p < 0) p = playlist.length - 1;

  let song = playlist[p];

  current = p;
  audio.src = song.mp3;
  audio.load();
  play();
};

// AUTO NEXT
audio.addEventListener("ended", () => {
  next();
});

loadSongs();

</script>

</body>
</html>
