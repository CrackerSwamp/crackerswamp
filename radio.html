<html>
<head>
  <title>Radio - Cracker Swamp</title>
</head>

<body style="background:#0b0b0b;color:white;font-family:Arial;margin:0;">

<!-- NAV -->
<div style="background:#0b0b0b;border-bottom:1px solid #222;padding:12px;text-align:center;">

  <div style="font-size:20px;font-weight:bold;margin-bottom:10px;">
    Cracker Swamp
  </div>

  <div style="line-height:2;">
    <a href="index.html" style="color:white;margin:0 10px;text-decoration:none;">Home</a>
    <a href="scenes.html" style="color:white;margin:0 10px;text-decoration:none;">Scenes</a>
    <a href="bands.html" style="color:white;margin:0 10px;text-decoration:none;">Bands</a>
    <a href="radio.html" style="color:white;margin:0 10px;text-decoration:none;">Radio</a>
    <a href="store.html" style="color:white;margin:0 10px;text-decoration:none;">Store</a>

    <a href="submit.html" style="
      display:inline-block;
      margin-left:10px;
      padding:6px 12px;
      background:#cc0000;
      border-radius:5px;
      color:white;
      text-decoration:none;
    ">
      Submit
    </a>
  </div>

</div>

<!-- HEADER -->
<div style="padding:80px 20px;text-align:center;">
  <h1 style="font-size:50px;margin-bottom:10px;">Cracker Swamp Radio</h1>

  <p style="color:#ccc;">
    Real bands streaming. No filler.
  </p>

  <p style="color:#888;">
    All signal. No noise.
  </p>
</div>

<!-- PLAYER -->
<div style="max-width:800px;margin:auto;padding:30px;background:#111;border-radius:8px;text-align:center;">

  <h2>Now Playing</h2>
  <p id="trackName" style="color:#aaa;">Reptar – Athens, GA</p>

  <audio id="audioPlayer" controls style="width:90%;">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <div style="margin-top:20px;">
    <button onclick="prevTrack()" style="padding:10px 20px;margin:5px;">Previous</button>
    <button onclick="nextTrack()" style="padding:10px 20px;margin:5px;">Next</button>
  </div>

</div>

<!-- PLAYLIST -->
<div style="max-width:800px;margin:auto;padding:40px;">

  <h2>Playlist</h2>

  <ul id="playlist" style="list-style:none;padding:0;color:#ccc;">
    <li onclick="playTrack(0)" style="cursor:pointer;margin:10px 0;">Reptar – Athens, GA</li>
    <li onclick="playTrack(1)" style="cursor:pointer;margin:10px 0;">Tedo Stone – Atlanta, GA</li>
    <li onclick="playTrack(2)" style="cursor:pointer;margin:10px 0;">Black Lips – Atlanta, GA</li>
  </ul>

</div>

<!-- SCRIPT -->
<script>
  const tracks = [
    {
      name: "Reptar – Athens, GA",
      src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    },
    {
      name: "Tedo Stone – Atlanta, GA",
      src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
    },
    {
      name: "Black Lips – Atlanta, GA",
      src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
    }
  ];

  let currentTrack = 0;

  const audioPlayer = document.getElementById("audioPlayer");
  const trackName = document.getElementById("trackName");

  function playTrack(index) {
    currentTrack = index;
    audioPlayer.src = tracks[index].src;
    trackName.innerText = tracks[index].name;
    audioPlayer.play();
  }

  function nextTrack() {
    currentTrack = (currentTrack + 1) % tracks.length;
    playTrack(currentTrack);
  }

  function prevTrack() {
    currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
    playTrack(currentTrack);
  }
</script>

</body>
</html>
