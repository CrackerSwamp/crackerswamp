<!DOCTYPE html>
<html>
<head>
  <title>Radio - Cracker Swamp</title>
</head>

<body style="background:#0b0b0b;color:white;font-family:Arial;margin:0;">

<!-- NAV -->
<div style="background:#0b0b0b;border-bottom:1px solid #222;padding:12px;text-align:center;">
  <div style="font-size:20px;font-weight:bold;margin-bottom:10px;">Cracker Swamp</div>

  <div style="line-height:2;">
    <a href="index.html" style="color:white;margin:0 10px;">Home</a>
    <a href="scenes.html" style="color:white;margin:0 10px;">Scenes</a>
    <a href="bands.html" style="color:white;margin:0 10px;">Bands</a>
    <a href="radio.html" style="color:white;margin:0 10px;">Radio</a>
    <a href="store.html" style="color:white;margin:0 10px;">Store</a>

    <a href="submit.html" style="padding:6px 12px;background:#cc0000;border-radius:5px;color:white;margin-left:10px;">
      Submit
    </a>
  </div>
</div>

<!-- HEADER -->
<div style="padding:80px 20px;text-align:center;">
  <h1 style="font-size:50px;">Cracker Swamp Radio</h1>
  <p style="color:#ccc;">Real bands streaming. No filler.</p>
  <p style="color:#888;">All signal. No noise.</p>
</div>

<!-- PLAYER -->
<div style="max-width:800px;margin:auto;padding:30px;background:#111;border-radius:8px;text-align:center;">
  <h2>Now Playing</h2>
  <p id="trackName" style="color:#aaa;">Loading...</p>

  <audio id="audioPlayer" controls style="width:90%;"></audio>

  <br>

  <button onclick="toggleShuffle()" style="margin-top:10px;padding:8px 15px;">
    Shuffle: Off
  </button>
</div>

<!-- PLAYLIST -->
<div style="max-width:800px;margin:auto;padding:40px;">
  <h2>Your Playlist (drag to reorder)</h2>
  <div id="playlist"></div>
</div>

<script>
const defaultTracks = [
  {
    name: "Replace Me – Real Band",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    img: "https://via.placeholder.com/40"
  },
  {
    name: "Add Your Bands Here",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
    img: "https://via.placeholder.com/40"
  },
  {
    name: "This Is Your Radio",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
    img: "https://via.placeholder.com/40"
  }
];

let tracks = JSON.parse(localStorage.getItem("playlist")) || defaultTracks;
let currentTrack = parseInt(localStorage.getItem("currentTrack")) || 0;
let shuffle = false;
let draggedIndex = null;

const audioPlayer = document.getElementById("audioPlayer");
const trackName = document.getElementById("trackName");
const playlistDiv = document.getElementById("playlist");

// RENDER PLAYLIST
function renderPlaylist() {
  playlistDiv.innerHTML = "";

  tracks.forEach((track, index) => {
    const item = document.createElement("div");

    item.draggable = true;
    item.dataset.index = index;

    item.style.display = "flex";
    item.style.alignItems = "center";
    item.style.margin = "10px 0";
    item.style.cursor = "grab";

    item.innerHTML = `
      <img src="${track.img}" style="width:40px;height:40px;border-radius:5px;margin-right:10px;">
      <span>${track.name}</span>
    `;

    item.onclick = () => playTrack(index);

    item.addEventListener("dragstart", (e) => draggedIndex = index);
    item.addEventListener("dragover", (e) => e.preventDefault());
    item.addEventListener("drop", (e) => {
      const targetIndex = index;
      const moved = tracks.splice(draggedIndex, 1)[0];
      tracks.splice(targetIndex, 0, moved);
      savePlaylist();
      renderPlaylist();
    });

    playlistDiv.appendChild(item);
  });
}

// PLAY TRACK
function playTrack(index) {
  currentTrack = index;

  localStorage.setItem("currentTrack", currentTrack);
  localStorage.setItem("currentTime", 0);

  audioPlayer.src = tracks[index].src;
  trackName.innerText = tracks[index].name;

  audioPlayer.play().catch(() => {});
}

// SAVE PLAYLIST
function savePlaylist() {
  localStorage.setItem("playlist", JSON.stringify(tracks));
}

// SHUFFLE
function toggleShuffle() {
  shuffle = !shuffle;
  document.querySelector("button").innerText = "Shuffle: " + (shuffle ? "On" : "Off");
}

// CONTINUOUS RADIO
audioPlayer.addEventListener("ended", () => {
  if (shuffle) {
    currentTrack = Math.floor(Math.random() * tracks.length);
  } else {
    currentTrack = (currentTrack + 1) % tracks.length;
  }
  playTrack(currentTrack);
});

// SAVE POSITION
audioPlayer.addEventListener("timeupdate", () => {
  localStorage.setItem("currentTime", audioPlayer.currentTime);
});

// RESTORE POSITION
const savedTime = parseFloat(localStorage.getItem("currentTime")) || 0;

audioPlayer.addEventListener("loadedmetadata", () => {
  audioPlayer.currentTime = savedTime;
});

// INIT
renderPlaylist();
playTrack(currentTrack);
</script>

</body>
</html>
