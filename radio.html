<!DOCTYPE html>
<html>
<head>
  <title>Cracker Swamp Radio</title>

  <style>
    body {
      background:#1a120b;
      color:#f5e6c8;
      font-family:Courier New, monospace;
      margin:0;
      text-align:center;
    }

    .radio {
      width:500px;
      margin:60px auto;
      background:#3b2a1d;
      border:8px solid #2a1b12;
      border-radius:20px;
      box-shadow:0 0 30px #000;
      padding:20px;
    }

    .screen {
      background:#111;
      color:#0f0;
      padding:15px;
      font-size:18px;
      height:50px;
      overflow:hidden;
      white-space:nowrap;
    }

    .scroll {
      display:inline-block;
      animation: scroll 10s linear infinite;
    }

    @keyframes scroll {
      from { transform: translateX(100%); }
      to { transform: translateX(-100%); }
    }

    .controls {
      margin-top:20px;
    }

    button {
      margin:5px;
      padding:10px 15px;
      background:#222;
      color:#fff;
      border:none;
      cursor:pointer;
    }

    .knobs {
      display:flex;
      justify-content:space-around;
      margin-top:20px;
    }

    .knob {
      width:80px;
      height:80px;
      border-radius:50%;
      background:#222;
      position:relative;
      cursor:pointer;
    }

    .indicator {
      width:4px;
      height:30px;
      background:#f5e6c8;
      position:absolute;
      top:10px;
      left:50%;
      transform-origin:bottom center;
      transform:rotate(0deg);
    }

  </style>
</head>
<body>

<div class="radio">

  <h2>Cracker Swamp Radio</h2>

  <div class="screen">
    <div id="scrollText" class="scroll">Loading...</div>
  </div>

  <div class="controls">
    <button onclick="play()">Play</button>
    <button onclick="pause()">Pause</button>
    <button onclick="next()">Next</button>
    <button onclick="prev()">Prev</button>
    <button onclick="toggleLoop()">Loop</button>
    <button onclick="shuffleToggle()">Random</button>
  </div>

  <div class="knobs">
    <div class="knob" onclick="volumeUp()">
      <div class="indicator" id="volInd"></div>
    </div>

    <div class="knob" onclick="next()">
      <div class="indicator" id="tunInd"></div>
    </div>
  </div>

</div>

<audio id="audioPlayer"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let playlist = [];
let current = 0;
let randomMode = false;
let loop = false;

const audio = document.getElementById("audioPlayer");
const scroll = document.getElementById("scrollText");

// LOAD
async function loadSongs() {
  const snap = await getDocs(collection(db, "bands"));

  snap.forEach(doc => {
    let b = doc.data();
    if (b.mp3) playlist.push(b);
  });

  loadTrack(0);
}

// LOAD TRACK
function loadTrack(i) {
  current = i;
  let song = playlist[i];

  audio.src = song.mp3;

  scroll.innerText = song.name + " - " + (song.location || "");
}

// PLAY
window.play = function() {
  audio.play();
};

// PAUSE
window.pause = function() {
  audio.pause();
};

// NEXT
window.next = function() {
  if (randomMode) {
    current = Math.floor(Math.random()*playlist.length);
  } else {
    current = (current+1)%playlist.length;
  }
  loadTrack(current);
  play();
};

// PREV
window.prev = function() {
  current = (current-1+playlist.length)%playlist.length;
  loadTrack(current);
  play();
};

// LOOP
window.toggleLoop = function() {
  loop = !loop;
};

// RANDOM
window.shuffleToggle = function() {
  randomMode = !randomMode;
};

// AUTO NEXT
audio.addEventListener("ended", () => {
  if (loop) {
    play();
  } else {
    next();
  }
});

// VOLUME KNOB
window.volumeUp = function() {
  audio.volume = Math.min(1, audio.volume + 0.1);
};

loadSongs();

</script>

</body>
</html>
