<!DOCTYPE html>
<html>
<head>
  <title>Radio - Cracker Swamp</title>
</head>

<body style="background:#0b0b0b;color:white;font-family:Arial;margin:0;">

<!-- NAV -->
<div style="background:#0b0b0b;border-bottom:1px solid #222;padding:12px;text-align:center;">
  <div style="font-size:20px;font-weight:bold;margin-bottom:10px;">Cracker Swamp</div>

  <div style="line-height:2;">
    <a href="index.html" style="color:white;margin:0 10px;">Home</a>
    <a href="scenes.html" style="color:white;margin:0 10px;">Scenes</a>
    <a href="bands.html" style="color:white;margin:0 10px;">Bands</a>
    <a href="radio.html" style="color:white;margin:0 10px;">Radio</a>
    <a href="store.html" style="color:white;margin:0 10px;">Store</a>

    <a href="submit.html" style="padding:6px 12px;background:#cc0000;border-radius:5px;color:white;margin-left:10px;">
      Submit
    </a>
  </div>
</div>

<!-- HEADER -->
<div style="padding:80px 20px;text-align:center;">
  <h1 style="font-size:50px;">Cracker Swamp Radio</h1>
  <p style="color:#ccc;">Real bands. No filler.</p>
  <p style="color:#888;">All signal. No noise.</p>
</div>

<!-- PLAYER PLACEHOLDER -->
<div style="max-width:800px;margin:auto;padding:30px;background:#111;border-radius:8px;text-align:center;">
  <h2>Now Playing</h2>
  <p style="color:#aaa;">Radio coming alive — real bands loading</p>

  <audio controls style="width:90%;opacity:0.5;" disabled></audio>

  <div style="margin-top:20px;">
    <a href="submit.html" style="
      padding:15px 30px;
      background:#cc0000;
      color:white;
      text-decoration:none;
      border-radius:5px;
      font-size:18px;
    ">
      Submit Your Band
    </a>
  </div>
</div>

<!-- GENRE BUTTONS -->
<div style="text-align:center;padding:40px;">
  <button onclick="showGenre('rock')" style="margin:5px;">Rock</button>
  <button onclick="showGenre('indie')" style="margin:5px;">Indie</button>
  <button onclick="showGenre('punk')" style="margin:5px;">Punk</button>
  <button onclick="showGenre('country')" style="margin:5px;">Country</button>
</div>

<!-- GENRE DISPLAY -->
<div id="genreSection" style="max-width:800px;margin:auto;padding:20px;"></div>

<script>
const genres = {
  rock: [
    "Band 1 – Rock",
    "Band 2 – Rock",
    "Band 3 – Rock",
    "Band 4 – Rock",
    "Band 5 – Rock"
  ],
  indie: [
    "Band 1 – Indie",
    "Band 2 – Indie",
    "Band 3 – Indie",
    "Band 4 – Indie",
    "Band 5 – Indie"
  ],
  punk: [
    "Band 1 – Punk",
    "Band 2 – Punk",
    "Band 3 – Punk",
    "Band 4 – Punk",
    "Band 5 – Punk"
  ],
  country: [
    "Band 1 – Country",
    "Band 2 – Country",
    "Band 3 – Country",
    "Band 4 – Country",
    "Band 5 – Country"
  ]
};

function showGenre(genre) {
  const section = document.getElementById("genreSection");

  section.innerHTML = `<h2 style="text-align:center;">Top ${genre.toUpperCase()} Bands</h2>`;

  genres[genre].forEach(band => {
    const div = document.createElement("div");
    div.style.background = "#111";
    div.style.padding = "15px";
    div.style.margin = "10px 0";
    div.style.borderRadius = "5px";

    div.innerText = band;
    section.appendChild(div);
  });
}
</script>

</body>
</html>
