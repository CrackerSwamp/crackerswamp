<!DOCTYPE html>
<html>
<head>
  <title>Radio</title>

  <style>
    body {
      background:#0b0b0b;
      margin:0;
      font-family:Arial;
      color:#e9d7b3;
      text-align:center;
    }

    /* 📱 MOBILE WIDTH */
    .radio {
      width:95%;
      max-width:520px;
      margin:20px auto;
      padding:12px;
      background:linear-gradient(135deg,#5b3f2b,#3a2518);
      border-radius:12px;
      position:relative;
      box-shadow:0 0 30px #000;
    }

    /* 🔥 TRIPLE BEAD BODY */
    .radio:before,
    .radio:after {
      content:"";
      position:absolute;
      inset:0;
      border-radius:12px;
      pointer-events:none;
    }

    .radio:before { border:3px solid #d4af37; }
    .radio:after  { inset:5px; border:2px solid #8b6a2b; }

    .innerBead {
      position:absolute;
      inset:10px;
      border:1px solid #2a1a10;
      border-radius:10px;
      pointer-events:none;
    }

    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    /* 🔊 SPEAKERS */
    .speaker {
      width:120px;
      height:120px;
      border-radius:50%;
      background:radial-gradient(#444,#000);
      position:relative;
      box-shadow:inset 0 0 25px #000;
    }

    .speaker.vibe {
      animation:pulse 0.2s infinite alternate;
    }

    @keyframes pulse {
      from { transform:scale(1); }
      to { transform:scale(1.06); }
    }

    /* 🔥 TRIPLE BEAD SPEAKERS */
    .speaker:before {
      content:"";
      position:absolute;
      inset:-6px;
      border:2px solid #d4af37;
      border-radius:50%;
    }

    .speaker:after {
      content:"";
      position:absolute;
      inset:6px;
      border:1px solid #8b6a2b;
      border-radius:50%;
    }

    /* 📟 SCREEN */
    .screenWrap {
      width:34%;
      position:relative;
      padding:6px;
    }

    /* 🔥 TRIPLE BEAD SCREEN */
    .screenWrap:before {
      content:"";
      position:absolute;
      inset:0;
      border:2px solid #d4af37;
    }

    .screenWrap:after {
      content:"";
      position:absolute;
      inset:4px;
      border:1px solid #8b6a2b;
    }

    .screenInner {
      position:absolute;
      inset:8px;
      border:1px solid #2a1a10;
    }

    .screen {
      position:relative;
      background:#000;
      color:#00ff88;
      font-family:Courier New;
      font-size:12px;
      padding:4px;
      overflow:hidden;
      white-space:nowrap;
    }

    .scroll {
      display:inline-block;
      animation:scroll 10s linear infinite;
    }

    @keyframes scroll {
      from { transform:translateX(100%); }
      to { transform:translateX(-100%); }
    }

    /* BUTTONS */
    .controls {
      margin-top:10px;
    }

    button {
      width:36px;
      height:30px;
      margin:3px;
      background:#1f1f1f;
      color:#fff;
      border:none;
      font-size:14px;
    }

    /* KNOBS */
    .knobs {
      display:flex;
      justify-content:space-around;
      margin-top:10px;
    }

    .knob {
      width:60px;
      height:60px;
      border-radius:50%;
      background:#222;
      position:relative;
      box-shadow:inset 0 0 10px #000;
    }

    .indicator {
      width:3px;
      height:20px;
      background:#d4af37;
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
    }

  </style>
</head>
<body>

<div class="radio">
<div class="innerBead"></div>

  <div class="top">
    <div class="speaker" id="spkL"></div>

    <div class="screenWrap">
      <div class="screenInner"></div>
      <div class="screen">
        <div id="scrollText" class="scroll">Loading...</div>
      </div>
    </div>

    <div class="speaker" id="spkR"></div>
  </div>

  <div class="controls">
    <button onclick="btn('Prev'); prev()">⏮</button>
    <button onclick="btn('Play'); play()">▶</button>
    <button onclick="btn('Pause'); pause()">⏸</button>
    <button onclick="btn('Next'); next()">⏭</button>
    <button onclick="btn('Loop'); toggleLoop()">🔁</button>
    <button onclick="btn('Random'); shuffleToggle()">🔀</button>
  </div>

  <div class="knobs">
    <div class="knob" onclick="volumeUp()"><div class="indicator"></div></div>
    <div class="knob" onclick="tune()"><div class="indicator"></div></div>
  </div>

</div>

<audio id="audioPlayer"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "cracker-swamp.firebaseapp.com",
  projectId: "cracker-swamp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let playlist=[], current=0, randomMode=false, loop=false;

const audio=document.getElementById("audioPlayer");
const scroll=document.getElementById("scrollText");
const spkL=document.getElementById("spkL");
const spkR=document.getElementById("spkR");

let timeout;

function showTemp(text){
  clearTimeout(timeout);
  scroll.innerText=text;
  timeout=setTimeout(showNow,1500);
}

function showNow(){
  let s=playlist[current];
  scroll.innerText=s.name+" - "+(s.location||"");
}

async function loadSongs(){
  const snap=await getDocs(collection(db,"bands"));
  snap.forEach(doc=>{
    let b=doc.data();
    if(b.mp3) playlist.push(b);
  });
  loadTrack(0);
}

function loadTrack(i){
  current=i;
  audio.src=playlist[i].mp3;
  showNow();
}

window.btn=(t)=>showTemp(t.toUpperCase());

window.play=()=>{
  audio.play();
  spkL.classList.add("vibe");
  spkR.classList.add("vibe");
};

window.pause=()=>{
  audio.pause();
  spkL.classList.remove("vibe");
  spkR.classList.remove("vibe");
};

window.next=()=>{
  current=randomMode?Math.floor(Math.random()*playlist.length):(current+1)%playlist.length;
  loadTrack(current);
  play();
};

window.prev=()=>{
  current=(current-1+playlist.length)%playlist.length;
  loadTrack(current);
  play();
};

window.toggleLoop=()=>loop=!loop;
window.shuffleToggle=()=>randomMode=!randomMode;

audio.addEventListener("ended",()=>loop?play():next());

window.volumeUp=()=>{
  audio.volume=Math.min(1,audio.volume+0.1);
  showTemp("VOL "+Math.round(audio.volume*100));
};

window.tune=()=>{
  next();
  showTemp("TUNE");
};

loadSongs();

</script>

</body>
</html>
