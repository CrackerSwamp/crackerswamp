<!DOCTYPE html>
<html>
<head>
<title>Radio</title>

<style>
body{
  background:#0b0b0b;
  margin:0;
  display:flex;
  justify-content:center;
  font-family:Arial;
}

/* OUTER BODY */
.radio{
  width:95%;
  max-width:520px;
  padding:20px 12px 0;
  position:relative;
}

/* 🔥 CONTOUR SHAPE */
.shell{
  background:linear-gradient(145deg,#5b3f2b,#3a2518);
  border-radius:40px 40px 20px 20px;
  padding:18px 12px 0;
  position:relative;
  box-shadow:0 0 30px #000;
}

/* carve the dip */
.shell:before{
  content:"";
  position:absolute;
  top:-18px;
  left:20%;
  width:60%;
  height:40px;
  background:#0b0b0b;
  border-bottom-left-radius:50%;
  border-bottom-right-radius:50%;
}

/* TRIPLE BEAD SHELL */
.shell:after{
  content:"";
  position:absolute;
  inset:0;
  border:3px solid #d4af37;
  border-radius:40px 40px 20px 20px;
}

.face{
  margin:10px;
  padding:14px 10px 0;
  background:#2a1a10;
  border-radius:30px 30px 16px 16px;
  position:relative;
}

/* inner bead */
.face:before{
  content:"";
  position:absolute;
  inset:6px;
  border:2px solid #8b6a2b;
  border-radius:28px 28px 14px 14px;
}

/* layout */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

/* SPEAKERS */
.speaker{
  width:32%;
  aspect-ratio:1;
  border-radius:50%;
  background:radial-gradient(#444,#000);
  position:relative;
  box-shadow:
    inset 0 0 25px #000,
    0 4px 8px rgba(0,0,0,0.6);
}

/* speaker depth rings */
.speaker:before{
  content:"";
  position:absolute;
  inset:-6px;
  border:2px solid #d4af37;
  border-radius:50%;
}
.speaker:after{
  content:"";
  position:absolute;
  inset:6px;
  border:1px solid #8b6a2b;
  border-radius:50%;
}

/* CENTER MODULE */
.center{
  width:30%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* SCREEN */
.screenWrap{
  width:100%;
  position:relative;
  padding:6px;
}

/* triple bead */
.screenWrap:before{
  content:"";
  position:absolute;
  inset:0;
  border:2px solid #d4af37;
}
.screenWrap:after{
  content:"";
  position:absolute;
  inset:5px;
  border:1px solid #8b6a2b;
}
.screenInner{
  position:absolute;
  inset:10px;
  border:1px solid #2a1a10;
}

/* recessed look */
.screen{
  background:#000;
  color:#00ff88;
  font-family:Courier New;
  font-size:12px;
  padding:8px;
  text-align:center;
  box-shadow:inset 0 0 10px #000;
}

/* BUTTONS */
.buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  margin-top:10px;
}

button{
  width:28px;
  height:22px;
  background:#1f1f1f;
  color:#fff;
  border:none;
  box-shadow:0 2px 3px rgba(0,0,0,0.6);
}

/* KNOBS */
.knobs{
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  margin-top:12px;
}

.knobWrap{text-align:center;}

.knob{
  width:56px;
  height:56px;
  border-radius:50%;
  background:#222;
  position:relative;
  box-shadow:
    inset 0 0 12px #000,
    0 3px 5px rgba(0,0,0,0.7);
}

.indicator{
  width:3px;
  height:18px;
  background:#d4af37;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
}

.label{
  font-size:11px;
  margin-top:4px;
  color:#bfa77a;
}

/* BASE */
.base{
  margin-top:12px;
  height:45px;
  background:linear-gradient(#2a1a10,#000);
  border-radius:0 0 18px 18px;
}

</style>
</head>

<body>

<div class="radio">
  <div class="shell">
    <div class="face">

      <div class="top">

        <div class="speaker"></div>

        <div class="center">
          <div class="screenWrap">
            <div class="screenInner"></div>
            <div class="screen">PLAY</div>
          </div>

          <div class="buttons">
            <button>⏮</button>
            <button>▶</button>
            <button>⏸</button>
            <button>⏭</button>
            <button>🔁</button>
            <button>🔀</button>
          </div>
        </div>

        <div class="speaker"></div>

      </div>

      <div class="knobs">
        <div class="knobWrap">
          <div class="knob"><div class="indicator"></div></div>
          <div class="label">VOL</div>
        </div>

        <div class="knobWrap">
          <div class="knob"><div class="indicator"></div></div>
          <div class="label">TUNE</div>
        </div>
      </div>

      <div class="base"></div>

    </div>
  </div>
</div>

</body>
</html>
