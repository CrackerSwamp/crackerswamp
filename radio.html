<!DOCTYPE html>
<html>
<head>
  <title>Cracker Swamp Radio</title>
  <style>
    body {
      background:#0b0b0b;
      color:white;
      font-family:Arial;
      margin:0;
      text-align:center;
    }

    /* NAV */
    .nav {
      background:#0b0b0b;
      border-bottom:1px solid #222;
      padding:10px;
    }

    .nav img {
      height:195px;
      max-width:90%;
      margin-bottom:10px;
    }

    .nav a {
      color:white;
      margin:0 10px;
      text-decoration:none;
    }

    .submit-btn {
      padding:6px 12px;
      background:#cc0000;
      border-radius:5px;
      color:white;
      margin-left:10px;
    }

    .header {
      padding:30px;
    }

    .player-box {
      max-width:600px;
      margin:20px auto;
      background:#111;
      padding:20px;
      border-radius:6px;
    }

    audio {
      width:100%;
      margin-top:10px;
    }

    .controls button {
      margin:5px;
      padding:10px 15px;
      background:#222;
      color:white;
      border:none;
      cursor:pointer;
    }

    .controls button:hover {
      background:#333;
    }

    .now-playing {
      font-size:18px;
      margin-top:10px;
      color:#ccc;
    }
  </style>
</head>
<body>

<!-- 🚚 NAV -->
<div class="nav">
  <img src="CRACKERSWAMP.png">

  <div>
    <a href="index.html">Home</a>
    <a href="radio.html">Radio</a>
    <a href="bands.html">Bands</a>
    <a href="store.html">Merch</a>
    <a href="submit.html" class="submit-btn">Submit</a>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Cracker Swamp Radio</h1>
  <p style="color:#777;">Real bands. No filler.</p>
</div>

<!-- PLAYER -->
<div class="player-box">

  <h2>Now Playing</h2>
  <div id="nowPlaying" class="now-playing">Nothing yet</div>

  <audio id="audioPlayer" controls></audio>

  <div class="controls">
    <button onclick="prevSong()">⏮ Prev</button>
    <button onclick="nextSong()">⏭ Next</button>
  </div>

</div>

<script>

// 🎵 GET DATA
let bands = JSON.parse(localStorage.getItem("bands")) || [];

// only keep ones with MP3
let playlist = bands.filter(b => b.mp3);

// fallback demo (so it’s not empty)
if (playlist.length === 0) {
  playlist = [
    { name: "Demo Track", mp3: "demo.mp3" }
  ];
}

let current = 0;

const player = document.getElementById("audioPlayer");
const nowPlaying = document.getElementById("nowPlaying");

// ▶ PLAY SONG
function playSong(index) {

  let track = playlist[index];

  player.src = track.mp3;
  player.play();

  nowPlaying.innerText = track.name || "Unknown Band";
}

// ⏭ NEXT
function nextSong() {
  current++;
  if (current >= playlist.length) current = 0;
  playSong(current);
}

// ⏮ PREV
function prevSong() {
  current--;
  if (current < 0) current = playlist.length - 1;
  playSong(current);
}

// 🔁 AUTO NEXT
player.addEventListener("ended", nextSong);

// ▶ START FIRST SONG
playSong(current);

</script>

</body>
</html>
