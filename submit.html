
<!DOCTYPE html>
<html>
<head>
  <title>Submit Your Band - Cracker Swamp</title>
</head>

<body style="background:#0b0b0b;color:white;font-family:Arial;margin:0;text-align:center;">

  <div style="padding:40px;">
    <h1 style="font-size:50px;">Submit Your Band</h1>

    <p style="font-size:20px;color:#ccc;">
      Got something real? Send it.
    </p>

    <p style="font-size:16px;color:#888;">
      We don’t promote garbage. If it’s good, it gets heard.
    </p>
  </div>

  <!-- FORM -->
  <div style="padding:30px;">

    <form action="https://formspree.io/f/xbdqrwon" method="POST">

      <input type="text" name="band" placeholder="Band Name" required
        style="padding:12px;width:300px;"><br><br>

      <input type="text" name="location" placeholder="City / State"
        style="padding:12px;width:300px;"><br><br>

      <input type="url" name="music" placeholder="Link to your music" required
        style="padding:12px;width:300px;"><br><br>

      <input type="text" name="image" placeholder="Link to band image (Google Drive, Dropbox, etc.)"
        style="padding:12px;width:300px;"><br><br>

      <input type="text" name="logo" placeholder="Link to band logo (optional)"
        style="padding:12px;width:300px;"><br><br>

      <textarea name="press" placeholder="Short bio / press info"
        style="padding:12px;width:300px;height:100px;"></textarea><br><br>

      <!-- 🔴 DISCLAIMER (VISIBLE) -->
      <div style="max-width:400px;margin:20px auto;padding:15px;background:#111;border:1px solid #333;border-radius:5px;">
        <p style="font-size:13px;color:#ccc;">
          By submitting, you confirm you own or have permission to share all content and grant Cracker Swamp the right to feature it.
        </p>
      </div>

      <button type="submit"
        style="padding:15px 30px;font-size:18px;background:red;color:white;border:none;border-radius:5px;">
        Send It
      </button>

    </form>

  </div>

</body>
</html>
