<div style="padding:80px;text-align:center;">
  <h1 style="font-size:50px;">Submit Your Band</h1>
  <p style="color:#888;">All signal. No noise.</p>

  <form action="https://formspree.io/f/xbdqrwon" method="POST" style="margin-top:30px;" enctype="multipart/form-data">

    <input type="text" name="band" placeholder="Band Name" required style="padding:10px;margin:10px;"><br>

    <input type="text" name="location" placeholder="Location" required style="padding:10px;margin:10px;"><br>

    <input type="text" name="genre" placeholder="Genre" required style="padding:10px;margin:10px;"><br>

    <textarea name="bio" placeholder="Short Bio" required style="padding:10px;margin:10px;width:250px;height:100px;"></textarea><br>

    <input type="url" name="music" placeholder="Link to Music (Spotify, Bandcamp, etc.)" required style="padding:10px;margin:10px;"><br>

    <label style="display:block;margin-top:10px;color:#ccc;">
      Upload Image / Logo (gives permission to use)
    </label>
    <input type="file" name="image" accept="image/*" style="margin:10px;"><br>

    <button type="submit" style="padding:15px 30px;background:#cc0000;color:white;border:none;border-radius:5px;">
      Submit
    </button>

  </form>

</div>
