<!-- HEADER -->
<div style="padding:80px;text-align:center;">
  <h1 style="font-size:50px;margin-bottom:10px;">Submit Your Band</h1>

  <p style="color:#ccc;">
    Real bands. Real sound. No industry BS.
  </p>

  <p style="color:#888;">
    All signal. No noise.
  </p>
</div>

<!-- FORM -->
<div style="max-width:600px;margin:auto;padding:30px;background:#111;border-radius:8px;text-align:center;">

  <form action="https://formspree.io/f/xbdqrwon" method="POST">

    <input type="text" name="band" placeholder="Band Name" required
      style="width:90%;padding:10px;margin:10px;border:none;border-radius:5px;"><br>

    <input type="text" name="location" placeholder="City, State" required
      style="width:90%;padding:10px;margin:10px;border:none;border-radius:5px;"><br>

    <input type="text" name="genre" placeholder="Genre (Rock, Indie, Punk, etc.)" required
      style="width:90%;padding:10px;margin:10px;border:none;border-radius:5px;"><br>

    <textarea name="bio" placeholder="Short Bio (2–3 sentences)" required
      style="width:90%;height:100px;padding:10px;margin:10px;border:none;border-radius:5px;"></textarea><br>

    <input type="url" name="music" placeholder="Music Link (Bandcamp, Spotify, YouTube)" required
      style="width:90%;padding:10px;margin:10px;border:none;border-radius:5px;"><br>

    <input type="url" name="image" placeholder="Image or Logo URL (Bandcamp, IG, Dropbox)" required
      style="width:90%;padding:10px;margin:10px;border:none;border-radius:5px;"><br>

    <!-- PERMISSION (THIS IS HUGE) -->
    <p style="color:#888;font-size:14px;margin-top:15px;">
      By submitting, you confirm you have permission to share this content and allow Cracker Swamp to feature it.
    </p>

    <button type="submit"
      style="margin-top:15px;padding:15px 30px;background:#cc0000;color:white;border:none;border-radius:5px;font-size:16px;">
      Submit
    </button>

  </form>

</div>
