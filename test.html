<!DOCTYPE html>
<html>
<head>
  <title>Cracker Swamp Test</title>
  <style>
    body { background:#111; color:#fff; font-family:Arial; }
    .video { margin:20px; }
  </style>
</head>
<body>

<h1>Georgia Scene</h1>

<div id="videos"></div>

<script>
// 🔥 DATA (INLINE — NO FILES, NO IMPORTS)

const videos = [
  {
    title: "Test Video 1",
    youtubeId: "ysz5S6PUM-U"
  },
  {
    title: "Test Video 2",
    youtubeId: "dQw4w9WgXcQ"
  }
];

// 🔥 RENDER

const container = document.getElementById("videos");

videos.forEach(v => {
  const div = document.createElement("div");
  div.className = "video";

  div.innerHTML = `
    <iframe width="300" height="200"
    src="https://www.youtube.com/embed/${v.youtubeId}">
    </iframe>
    <p>${v.title}</p>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
